{{ define "main" }}
<div class="post-list">
  {{ range (where .Site.RegularPages "Section" "post").ByDate.Reverse }}
  <article class="post-summary">
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <div class="post-meta">{{ .Date.Format "January 2, 2006" }}</div>
    <p>{{ .Summary }}</p>
  </article>
  {{ end }}
</div>
{{ end }}
