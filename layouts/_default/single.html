{{ define "main" }}
<article>
  <header class="article-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      {{ .Date.Format "January 2, 2006" }}
      {{ with .Params.tags }}
        ·
        {{ range . }}<a href="{{ "/tags/" | absURL }}{{ . | urlize }}" class="tag">{{ . }}</a> {{ end }}
      {{ end }}
    </div>
  </header>
  <div class="article-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
